name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        cat > gradlew << 'EOF'
        #!/bin/sh
        #
        # Gradle start up script for POSIX generated by Gradle.
        #
        # Attempt to set APP_HOME
        APP_HOME=$(cd "$(dirname "$0")" && pwd)
        # Add default JVM options here.
        DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
        # Use the maximum available, or set MAX_FD != -1 to use that value.
        MAX_FD=maximum
        # Collect all arguments for the java command
        set --             "-Dorg.gradle.appname=$(basename "$0")"             -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar"             org.gradle.wrapper.GradleWrapperMain             "$@"
        # Determine the Java command to use to start the JVM.
        if [ -n "$JAVA_HOME" ] ; then
            JAVACMD="$JAVA_HOME/bin/java"
        else
            JAVACMD="java"
        fi
        exec "$JAVACMD" $DEFAULT_JVM_OPTS "$@"
        EOF
        chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: PenHook-signed
        path: ${{steps.sign_app.outputs.signedReleaseFile}}

    - name: Upload to Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{steps.sign_app.outputs.signedReleaseFile}}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
